<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        img#pencil1{
            float: left;
        }
        img#pencil2{
            float: right;
        }
    </style>
</head>
<body>
    <h2><center>Float Right</center></h2>
    <hr>
    <p>In this example, the image will float to the right in the paragraph, and the text in the paragraph will wrap around the image.</p>
    <p>
        <img id="pencil1" src="pencil.png" style="width: 100px; height: 100px;">
        <img id="pencil2" src="pencil.png" style="width: 100px; height: 100px;">
        <center>This is an image of pencil</center>
    </p>
</body>
</html>
